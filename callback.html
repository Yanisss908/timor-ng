<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Timor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e8e8f0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    .logo { font-size: 2.5rem; font-weight: 700; letter-spacing: 0.1em; }
    .logo span { color: #c9a84c; }
    .status {
      font-size: 0.95rem;
      color: #a0a0b8;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #c9a84c33;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      color: #e05252;
      font-size: 0.9rem;
      max-width: 400px;
      text-align: center;
      padding: 12px 20px;
      background: #e0525218;
      border: 1px solid #e0525240;
      border-radius: 10px;
      display: none;
    }
    .btn-retry {
      padding: 10px 24px;
      background: #c9a84c;
      color: #0f0f1a;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: none;
      text-decoration: none;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo">TI<span>MOR</span></div>
  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Connexion en cours…</span>
  </div>
  <div class="error" id="error-box"></div>
  <a class="btn-retry" id="btn-retry" href="https://yanisss908.github.io/timor-ng/">Retour à l'accueil</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://hhirhrvyqzkdezjenpdr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoaXJocnZ5cXprZGV6amVucGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTI1NzYsImV4cCI6MjA5NTY2ODU3Nn0.4AbQlyhoZPOWMTgzLCSL-8590ZuOhF8uKP2Wp9SGGZc';

    // ══ Storage UNIQUEMENT localStorage — partagé entre tous les onglets du même domaine ══
    const _store = {
      _mem: {},
      getItem(k) {
        try { const v = localStorage.getItem(k); if (v !== null) return v; } catch(e) {}
        return this._mem[k] ?? null;
      },
      setItem(k, v) {
        try { localStorage.setItem(k, v); } catch(e) {}
        this._mem[k] = v;
      },
      removeItem(k) {
        try { localStorage.removeItem(k); } catch(e) {}
        delete this._mem[k];
      },
    };

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage:            _store,
        persistSession:     true,
        detectSessionInUrl: true,   // détecte le ?code= dans l'URL et échange automatiquement
        autoRefreshToken:   true,
        flowType:           'pkce'
      }
    });

    async function handleCallback() {
      const statusText = document.getElementById('status-text');

      try {
        statusText.textContent = 'Échange du code OAuth…';

        // Supabase avec detectSessionInUrl=true échange automatiquement le ?code=
        // getSession() attend que cet échange soit terminé
        const { data, error } = await sb.auth.getSession();

        if (error) throw error;

        if (data?.session) {
          statusText.textContent = 'Connecté ! Redirection…';
          setTimeout(() => {
            window.location.replace('https://yanisss908.github.io/timor-ng/');
          }, 500);
          return;
        }

        // Pas de session immédiate → écouter l'événement SIGNED_IN
        statusText.textContent = 'Finalisation…';

        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_IN' && session) {
            subscription.unsubscribe();
            statusText.textContent = 'Connecté ! Redirection…';
            setTimeout(() => {
              window.location.replace('https://yanisss908.github.io/timor-ng/');
            }, 500);
          }
        });

        // Timeout de sécurité : 12 secondes
        setTimeout(() => {
          if (!statusText.textContent.includes('Redirection')) {
            showError('La connexion a pris trop de temps. Essaie de te reconnecter.');
          }
        }, 12000);

      } catch (err) {
        console.error('[Callback] Erreur:', err);
        showError('Erreur lors de la connexion : ' + (err.message || 'inconnue'));
      }
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      const errorBox = document.getElementById('error-box');
      const btnRetry = document.getElementById('btn-retry');
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      btnRetry.style.display = 'inline-block';
    }

    handleCallback();
  </script>
</body>
</html>
