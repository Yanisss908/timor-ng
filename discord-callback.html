<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion — Timor</title>
<style>
  body { background:#0d0d0f; color:#c9a84c; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:1rem; }
</style>
</head>
<body>
<div id="msg">⚔️ Connexion en cours…</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hhirhrvyqzkdezjenpdr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoaXJocnZ5cXprZGV6amVucGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTI1NzYsImV4cCI6MjA5NTY2ODU3Nn0.4AbQlyhoZPOWMTgzLCSL-8590ZuOhF8uKP2Wp9SGGZc';

const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    storage: window.localStorage,
    persistSession: true,
    detectSessionInUrl: true,
    autoRefreshToken: true,
    flowType: 'implicit'
  }
});

const msgEl = document.getElementById('msg');

(async function() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');

  if (!access_token || !refresh_token) {
    msgEl.textContent = '⚠️ Tokens manquants dans l\'URL. Hash reçu : ' + (window.location.hash || '(vide)');
    setTimeout(() => window.location.replace('./index.html'), 3000);
    return;
  }

  msgEl.textContent = '🔄 Tokens trouvés, création de la session…';

  const { data, error } = await _sb.auth.setSession({ access_token, refresh_token });

  if (error) {
    msgEl.textContent = '❌ Erreur setSession : ' + error.message;
    setTimeout(() => window.location.replace('./index.html'), 3000);
    return;
  }

  if (!data?.session) {
    msgEl.textContent = '❌ Session nulle après setSession.';
    setTimeout(() => window.location.replace('./index.html'), 3000);
    return;
  }

  // Vérifier que le localStorage a bien été écrit
  const keys = Object.keys(localStorage).filter(k => k.includes('supabase'));
  msgEl.textContent = '✅ Session créée (' + (data.session.user?.email || data.session.user?.id || '?') + '). Redirection…';

  // Attendre que le localStorage soit bien persisté avant de rediriger
  setTimeout(() => window.location.replace('./index.html'), 1200);
})();
</script>
</body>
</html>
