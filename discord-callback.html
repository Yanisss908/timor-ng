<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Timor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cinzel', serif;
    background: #0d0d0f;
    color: #c9a84c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 1.25rem;
    letter-spacing: 0.1em;
  }
  .emblem {
    width: 64px; height: 64px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0.5rem;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .emblem svg { width: 28px; height: 28px; fill: #c9a84c; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(201,168,76,0.15);
    border-top-color: #c9a84c;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title { font-size: 0.8rem; letter-spacing: 0.2em; color: #c9a84c; }
  .msg { color: #5a5448; font-size: 0.72rem; letter-spacing: 0.08em; }
  .error {
    color: #a54a4a;
    font-size: 0.8rem;
    background: rgba(165,74,74,0.1);
    border: 1px solid rgba(165,74,74,0.25);
    padding: 10px 20px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="emblem">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.25C17.25 21.15 21 16.25 21 11V5L12 1zm0 4l6 2.67V11c0 3.75-2.57 7.26-6 8.43C8.57 18.26 6 14.75 6 11V7.67L12 5z"/>
  </svg>
</div>
<div class="spinner"></div>
<div class="title">AUTHENTIFICATION EN COURS</div>
<div class="msg" id="status">Finalisation de la connexion Discord…</div>

<!--
  Supabase gère automatiquement le token OAuth depuis le hash de l'URL (#access_token=…).
  Il suffit d'importer le client Supabase, puis de rediriger vers index.html.
  Supabase intercepte le fragment avant la redirection et stocke la session.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ─── CONFIGURATION — remplace par tes vraies valeurs ───
  const SUPABASE_URL = 'https://hhirhrvyqzkdezjenpdr.supabase.co';
  const SUPABASE_ANON_KEY = 'REMPLACE_PAR_TA_PUBLISHABLE_KEY';
  // ────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  (async function () {
    var statusEl = document.getElementById('status');

    // Vérifier s'il y a une erreur OAuth dans l'URL
    var hashParams = new URLSearchParams(window.location.hash.slice(1));
    var queryParams = new URLSearchParams(window.location.search);
    var error = hashParams.get('error') || queryParams.get('error');

    if (error) {
      statusEl.textContent = '';
      var errDiv = document.createElement('div');
      errDiv.className = 'error';
      errDiv.textContent = 'Connexion annulée — retour au site…';
      statusEl.parentNode.insertBefore(errDiv, statusEl);
      setTimeout(function () { window.location.replace('index.html'); }, 2500);
      return;
    }

    // Supabase récupère automatiquement la session depuis le hash #access_token
    // On attend juste que la session soit établie
    const { data: { session }, error: sessionError } = await _supabase.auth.getSession();

    if (sessionError) {
      console.warn('Session error:', sessionError.message);
    }

    statusEl.textContent = 'Redirection vers Timor…';
    setTimeout(function () {
      window.location.replace('index.html');
    }, 800);
  })();
</script>
</body>
</html>
